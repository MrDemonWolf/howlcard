<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MrDemonWolf OG tool</title>
  <style>
    :root { --navy:#0A1633; --panel:#16244A; --accent:#3AAEE3; --text:#F5F7FB; --sub:#9FD3EF; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--navy); color:var(--text);
      font:15px/1.5 "DM Sans", -apple-system, system-ui, sans-serif; }
    main { max-width:1080px; margin:0 auto; padding:32px 20px 60px; }
    h1 { font-size:26px; margin:0 0 2px; } h1 span { color:var(--accent); }
    .sub { color:var(--sub); margin:0 0 22px; font-size:14px; }
    .grid { display:grid; grid-template-columns:340px 1fr; gap:24px; align-items:start; }
    @media (max-width:820px){ .grid { grid-template-columns:1fr; } }
    form { background:var(--panel); border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:12px; }
    label { font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--sub); display:flex; flex-direction:column; gap:5px; }
    input, select { font:14px "DM Sans", system-ui, sans-serif; color:var(--text);
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14);
      border-radius:9px; padding:9px 11px; outline:none; width:100%; }
    input:focus, select:focus { border-color:var(--accent); }
    select option { color:#111; }
    .pull { display:flex; gap:8px; }
    .pull input { flex:1; min-width:0; }
    button { font:600 13px "DM Sans", sans-serif; background:var(--accent); color:#06243F;
      border:0; border-radius:999px; padding:9px 15px; cursor:pointer; white-space:nowrap; }
    button:disabled { opacity:.5; cursor:wait; }
    .note { font-size:12px; color:var(--sub); min-height:16px; }
    .drop { border:1.5px dashed rgba(255,255,255,.25); border-radius:10px; padding:12px;
      text-align:center; font-size:13px; color:var(--sub); cursor:pointer; }
    .drop.armed { border-color:var(--accent); color:var(--text); }
    .preview { background:var(--panel); border-radius:14px; padding:18px; }
    .preview img { width:100%; border-radius:10px; display:block; background:#0008; min-height:200px; }
    .row { display:flex; gap:10px; margin-top:14px; }
    a.btn { flex:1; text-align:center; font:600 14px "DM Sans", sans-serif;
      background:var(--accent); color:#06243F; border-radius:999px; padding:11px 16px; text-decoration:none; }
    .hide { display:none; }
  </style>
</head>
<body>
  <main>
    <h1>MrDemonWolf OG tool<span>.</span></h1>
    <p class="sub">1200×630 OpenGraph cards, rendered in your browser. Paste a mrdemonwolf.com URL to pull the data, or type the fields. Design follows the page type.</p>
    <div class="grid">
      <form id="f" onsubmit="return false">
        <label>Pull from URL
          <span class="pull">
            <input id="url" type="url" placeholder="https://www.mrdemonwolf.com/blog/…" />
            <button id="pull" type="button">Pull</button>
          </span>
        </label>
        <div class="note" id="pullnote"></div>
        <label>Page type
          <select id="type">
            <option value="blog">Blog post</option>
            <option value="portfolio">Portfolio project</option>
            <option value="service">Service page</option>
            <option value="default">Site default</option>
          </select>
        </label>
        <label data-f="title">Title <input id="title" value="WordPress SEO Tips to Boost Your Site's Visibility" /></label>
        <label data-f="label">Chip label <input id="label" value="WordPress" /></label>
        <div data-f="image">
          <label>Background image</label>
          <div class="drop" id="drop">Drop an image here or click to choose.<br />(Used when the site blocks direct image fetches.)</div>
          <input id="file" type="file" accept="image/*" class="hide" />
          <div class="note" id="imgnote"></div>
        </div>
      </form>
      <div class="preview">
        <img id="img" alt="card preview" />
        <div class="row"><a class="btn" id="dl" download="og.png">Download PNG</a></div>
      </div>
    </div>
  </main>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
